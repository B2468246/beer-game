<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zahnrad-Hintergrund 3 (ohne Waage & Flagge, größere Rakete mit Countdown)</title>
<style>
    html, body { margin: 0; padding: 0; height: 100%; background: #FFF4DA; overflow: hidden; font-family: system-ui, sans-serif; }
    svg { display: block; width: 100vw; height: 100vh; }
    .hint {
        position: fixed; bottom: 14px; left: 14px;
        background: rgba(255,255,255,0.88);
        border: 1px solid #E0D7C4;
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 13px;
        color: #5D4037;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
</style>
</head>
<body>

<svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <!-- warm dotted paper background -->
        <pattern id="paper" x="0" y="0" width="38" height="38" patternUnits="userSpaceOnUse">
            <rect width="38" height="38" fill="#FFF4DA"/>
            <circle cx="19" cy="19" r="1.2" fill="#EBDDBA"/>
        </pattern>

        <!-- soft cloud shape -->
        <g id="cloud">
            <ellipse cx="0"   cy="0" rx="28" ry="18" fill="#FFFFFF" opacity="0.9"/>
            <ellipse cx="-22" cy="6" rx="22" ry="14" fill="#FFFFFF" opacity="0.85"/>
            <ellipse cx="24"  cy="6" rx="22" ry="14" fill="#FFFFFF" opacity="0.85"/>
            <ellipse cx="-4"  cy="-10" rx="20" ry="13" fill="#FFFFFF" opacity="0.9"/>
        </g>

        <!-- the gear shape (12 teeth) -->
        <g id="gearShape">
            <g fill="currentColor">
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(0)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(30)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(60)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(90)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(120)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(150)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(180)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(210)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(240)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(270)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(300)"/>
                <rect x="-7" y="-68" width="14" height="18" rx="2" transform="rotate(330)"/>
            </g>
            <circle cx="0" cy="0" r="52" fill="currentColor"/>
            <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="3"/>
            <circle cx="0"   cy="-28" r="7" fill="rgba(0,0,0,0.35)"/>
            <circle cx="24"  cy="14"  r="7" fill="rgba(0,0,0,0.35)"/>
            <circle cx="-24" cy="14"  r="7" fill="rgba(0,0,0,0.35)"/>
            <circle cx="0" cy="0" r="14" fill="rgba(255,255,255,0.9)" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
            <circle cx="0" cy="0" r="4"  fill="rgba(0,0,0,0.55)"/>
        </g>

        <!-- hot-air balloon -->
        <g id="balloon">
            <ellipse cx="0" cy="-40" rx="46" ry="54" fill="#EF5350"/>
            <path d="M -46 -40 A 46 54 0 0 0 46 -40 L 46 -20 A 46 40 0 0 1 -46 -20 Z" fill="#FFCA28"/>
            <path d="M -46 -20 A 46 40 0 0 0 46 -20 L 30 8 L -30 8 Z" fill="#42A5F5"/>
            <line x1="-22" y1="8"  x2="-14" y2="42" stroke="#5D4037" stroke-width="2"/>
            <line x1="22"  y1="8"  x2="14"  y2="42" stroke="#5D4037" stroke-width="2"/>
            <rect x="-18" y="42" width="36" height="22" rx="3" fill="#8D6E63" stroke="#4E342E" stroke-width="2"/>
            <rect x="-18" y="42" width="36" height="5" fill="#4E342E"/>
        </g>

        <!-- little rocket (slightly bigger than v2) -->
        <g id="rocket">
            <path d="M 0 -65 L 18 0 L 18 34 L -18 34 L -18 0 Z" fill="#F5F5F5" stroke="#37474F" stroke-width="2.5"/>
            <path d="M 0 -65 L 18 0 L -18 0 Z" fill="#EF5350" stroke="#37474F" stroke-width="2.5"/>
            <circle cx="0" cy="-16" r="8" fill="#90CAF9" stroke="#37474F" stroke-width="2.5"/>
            <path d="M -18 14 L -34 40 L -18 34 Z" fill="#EF5350" stroke="#37474F" stroke-width="2.5"/>
            <path d="M 18 14 L 34 40 L 18 34 Z" fill="#EF5350" stroke="#37474F" stroke-width="2.5"/>
            <!-- flame (only shows when launching — made with animate on opacity) -->
            <g>
                <path d="M -13 34 Q 0 78 13 34 Z" fill="#FFB300">
                    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.94;0.95;1;1" dur="120s" repeatCount="indefinite"/>
                </path>
                <path d="M -8 34 Q 0 62 8 34 Z" fill="#FFEB3B">
                    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.94;0.95;1;1" dur="120s" repeatCount="indefinite"/>
                </path>
            </g>
        </g>

        <!-- tiny bird silhouette -->
        <g id="bird">
            <path d="M -14 0 Q -7 -10 0 0 Q 7 -10 14 0" fill="none" stroke="#37474F" stroke-width="3" stroke-linecap="round"/>
        </g>

        <!-- star sparkle -->
        <g id="sparkle">
            <path d="M 0 -10 L 2 -2 L 10 0 L 2 2 L 0 10 L -2 2 L -10 0 L -2 -2 Z" fill="#FFD54F"/>
        </g>
    </defs>

    <rect width="1600" height="1000" fill="url(#paper)"/>

    <!-- lazy clouds (continuous, slow) -->
    <g>
        <animateTransform attributeName="transform" type="translate" from="-120 0" to="1720 0" dur="90s" repeatCount="indefinite"/>
        <use href="#cloud" x="0" y="120"/>
    </g>
    <g>
        <animateTransform attributeName="transform" type="translate" from="-200 0" to="1720 0" dur="130s" repeatCount="indefinite" begin="-40s"/>
        <use href="#cloud" x="0" y="200" transform="scale(0.75)"/>
    </g>
    <g>
        <animateTransform attributeName="transform" type="translate" from="-120 0" to="1720 0" dur="110s" repeatCount="indefinite" begin="-70s"/>
        <use href="#cloud" x="0" y="80" transform="scale(1.1)"/>
    </g>

    <!-- ═══════════════════════════════════════════════
         GEAR CLUSTER — 17 gears, alternating directions
         ═══════════════════════════════════════════════ -->

    <g transform="translate(210, 330)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
        <g transform="scale(2.3)"><use href="#gearShape" style="color:#E91E63"/></g>
    </g></g>

    <g transform="translate(475, 225)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="17s" repeatCount="indefinite"/>
        <g transform="scale(1.35)"><use href="#gearShape" style="color:#FFB300"/></g>
    </g></g>

    <g transform="translate(630, 135)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="9s" repeatCount="indefinite"/>
        <g transform="scale(0.82)"><use href="#gearShape" style="color:#43A047"/></g>
    </g></g>

    <g transform="translate(790, 260)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="15s" repeatCount="indefinite"/>
        <g transform="scale(1.5)"><use href="#gearShape" style="color:#039BE5"/></g>
    </g></g>

    <g transform="translate(1040, 215)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="22s" repeatCount="indefinite"/>
        <g transform="scale(1.18)"><use href="#gearShape" style="color:#8E24AA"/></g>
    </g></g>

    <g transform="translate(1230, 125)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="10s" repeatCount="indefinite"/>
        <g transform="scale(0.72)"><use href="#gearShape" style="color:#F4511E"/></g>
    </g></g>

    <g transform="translate(1395, 340)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="24s" repeatCount="indefinite"/>
        <g transform="scale(1.9)"><use href="#gearShape" style="color:#00ACC1"/></g>
    </g></g>

    <g transform="translate(150, 680)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="19s" repeatCount="indefinite"/>
        <g transform="scale(1.28)"><use href="#gearShape" style="color:#7CB342"/></g>
    </g></g>

    <g transform="translate(340, 620)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
        <g transform="scale(0.7)"><use href="#gearShape" style="color:#FDD835"/></g>
    </g></g>

    <g transform="translate(530, 750)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="30s" repeatCount="indefinite"/>
        <g transform="scale(2.0)"><use href="#gearShape" style="color:#3949AB"/></g>
    </g></g>

    <g transform="translate(760, 660)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="11s" repeatCount="indefinite"/>
        <g transform="scale(0.92)"><use href="#gearShape" style="color:#E53935"/></g>
    </g></g>

    <g transform="translate(960, 780)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="20s" repeatCount="indefinite"/>
        <g transform="scale(1.42)"><use href="#gearShape" style="color:#00897B"/></g>
    </g></g>

    <g transform="translate(1165, 700)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="7s" repeatCount="indefinite"/>
        <g transform="scale(0.8)"><use href="#gearShape" style="color:#FB8C00"/></g>
    </g></g>

    <g transform="translate(1410, 800)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="32s" repeatCount="indefinite"/>
        <g transform="scale(1.75)"><use href="#gearShape" style="color:#6D4C41"/></g>
    </g></g>

    <!-- three tiny helper gears -->
    <g transform="translate(420, 480)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
        <g transform="scale(0.55)"><use href="#gearShape" style="color:#D81B60"/></g>
    </g></g>
    <g transform="translate(1100, 470)"><g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="5.5s" repeatCount="indefinite"/>
        <g transform="scale(0.5)"><use href="#gearShape" style="color:#1E88E5"/></g>
    </g></g>
    <g transform="translate(660, 430)"><g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6.5s" repeatCount="indefinite"/>
        <g transform="scale(0.48)"><use href="#gearShape" style="color:#FFEB3B"/></g>
    </g></g>

    <!-- ═══════════════════════════════════════════════
         PENDULUM CLOCK (swings forever)
         ═══════════════════════════════════════════════ -->
    <g transform="translate(90, 480)">
        <rect x="-8" y="-10" width="16" height="16" rx="2" fill="#4E342E"/>
        <g>
            <animateTransform attributeName="transform" type="rotate"
                values="35 0 0; -35 0 0; 35 0 0"
                keyTimes="0; 0.5; 1"
                calcMode="spline"
                keySplines="0.4 0 0.6 1 ; 0.4 0 0.6 1"
                dur="2.4s" repeatCount="indefinite"/>
            <line x1="0" y1="0" x2="0" y2="220" stroke="#6D4C41" stroke-width="5"/>
            <circle cx="0" cy="230" r="22" fill="#FFB300" stroke="#6D4C41" stroke-width="3"/>
            <circle cx="0" cy="230" r="6"  fill="#6D4C41"/>
        </g>
    </g>

    <!-- ═══════════════════════════════════════════════
         CHIMNEY WITH STEAM PUFFS (continuous)
         ═══════════════════════════════════════════════ -->
    <g transform="translate(1280, 560)">
        <!-- brick chimney -->
        <rect x="-25" y="0"  width="50" height="110" fill="#C2185B" stroke="#880E4F" stroke-width="2"/>
        <rect x="-30" y="-8" width="60" height="12"  fill="#880E4F"/>
        <line x1="-25" y1="30" x2="25" y2="30" stroke="#880E4F" stroke-width="1.5"/>
        <line x1="-25" y1="60" x2="25" y2="60" stroke="#880E4F" stroke-width="1.5"/>
        <line x1="-25" y1="90" x2="25" y2="90" stroke="#880E4F" stroke-width="1.5"/>

        <!-- three staggered steam puffs -->
        <g>
            <circle cx="0" cy="0" r="18" fill="#ECEFF1">
                <animate attributeName="cy" values="-10; -140" dur="4s" repeatCount="indefinite"/>
                <animate attributeName="r"  values="14; 34"  dur="4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.9; 0" dur="4s" repeatCount="indefinite"/>
            </circle>
        </g>
        <g>
            <circle cx="0" cy="0" r="18" fill="#ECEFF1">
                <animate attributeName="cy" values="-10; -140" dur="4s" repeatCount="indefinite" begin="-1.3s"/>
                <animate attributeName="r"  values="14; 34"  dur="4s" repeatCount="indefinite" begin="-1.3s"/>
                <animate attributeName="opacity" values="0.9; 0" dur="4s" repeatCount="indefinite" begin="-1.3s"/>
            </circle>
        </g>
        <g>
            <circle cx="0" cy="0" r="18" fill="#ECEFF1">
                <animate attributeName="cy" values="-10; -140" dur="4s" repeatCount="indefinite" begin="-2.6s"/>
                <animate attributeName="r"  values="14; 34"  dur="4s" repeatCount="indefinite" begin="-2.6s"/>
                <animate attributeName="opacity" values="0.9; 0" dur="4s" repeatCount="indefinite" begin="-2.6s"/>
            </circle>
        </g>
    </g>

    <!-- ═══════════════════════════════════════════════
         BOUNCING BALL (continuous)
         ═══════════════════════════════════════════════ -->
    <g transform="translate(1100, 880)">
        <g>
            <animateTransform attributeName="transform" type="translate"
                values="0 0 ; 0 -160 ; 0 0"
                keyTimes="0; 0.5; 1"
                calcMode="spline"
                keySplines="0.3 0 0.3 1 ; 0.7 0 0.7 1"
                dur="1.6s" repeatCount="indefinite"/>
            <circle r="16" fill="#FF4081" stroke="#AD1457" stroke-width="2"/>
            <circle cx="-5" cy="-5" r="4" fill="rgba(255,255,255,0.75)"/>
        </g>
    </g>

    <!-- ═══════════════════════════════════════════════
         FLOATING BUBBLES (continuous, rising & fading)
         ═══════════════════════════════════════════════ -->
    <g>
        <circle cx="300" cy="920" r="8" fill="rgba(100,180,255,0.55)" stroke="rgba(0,100,200,0.5)" stroke-width="1.5">
            <animate attributeName="cy" values="920; -40" dur="11s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.9; 0.9; 0" keyTimes="0; 0.1; 0.8; 1" dur="11s" repeatCount="indefinite"/>
        </circle>
    </g>
    <g>
        <circle cx="720" cy="920" r="10" fill="rgba(100,180,255,0.55)" stroke="rgba(0,100,200,0.5)" stroke-width="1.5">
            <animate attributeName="cy" values="920; -40" dur="14s" repeatCount="indefinite" begin="-5s"/>
            <animate attributeName="opacity" values="0; 0.9; 0.9; 0" keyTimes="0; 0.1; 0.8; 1" dur="14s" repeatCount="indefinite" begin="-5s"/>
        </circle>
    </g>
    <g>
        <circle cx="1320" cy="920" r="6" fill="rgba(100,180,255,0.55)" stroke="rgba(0,100,200,0.5)" stroke-width="1.5">
            <animate attributeName="cy" values="920; -40" dur="9s" repeatCount="indefinite" begin="-3s"/>
            <animate attributeName="opacity" values="0; 0.9; 0.9; 0" keyTimes="0; 0.1; 0.8; 1" dur="9s" repeatCount="indefinite" begin="-3s"/>
        </circle>
    </g>
    <g>
        <circle cx="1540" cy="920" r="12" fill="rgba(100,180,255,0.55)" stroke="rgba(0,100,200,0.5)" stroke-width="1.5">
            <animate attributeName="cy" values="920; -40" dur="16s" repeatCount="indefinite" begin="-8s"/>
            <animate attributeName="opacity" values="0; 0.9; 0.9; 0" keyTimes="0; 0.1; 0.8; 1" dur="16s" repeatCount="indefinite" begin="-8s"/>
        </circle>
    </g>

    <!-- ═══════════════════════════════════════════════
         EVENT EVERY 60 SECONDS — hot-air balloon glides
         across the sky. Visible ~8s per minute.
         ═══════════════════════════════════════════════ -->
    <g>
        <animateTransform attributeName="transform" type="translate"
            values="-120 180 ; -120 180 ; 1720 130 ; 1720 130"
            keyTimes="0; 0.05; 0.18; 1"
            dur="60s" repeatCount="indefinite"/>
        <g>
            <!-- gentle up-down bob while flying -->
            <animateTransform attributeName="transform" type="translate"
                values="0 0; 0 -10; 0 0" dur="3s" repeatCount="indefinite" additive="sum"/>
            <use href="#balloon"/>
        </g>
    </g>

    <!-- a few sparkles drifting behind the balloon (also 60s cycle) -->
    <g>
        <animateTransform attributeName="transform" type="translate"
            values="-80 210 ; -80 210 ; 1700 160 ; 1700 160"
            keyTimes="0; 0.06; 0.22; 1"
            dur="60s" repeatCount="indefinite"/>
        <use href="#sparkle">
            <animateTransform attributeName="transform" type="rotate"
                from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
        </use>
    </g>

    <!-- ═══════════════════════════════════════════════
         EVENT EVERY 120 SECONDS — rocket launches from
         the bottom-right platform. Visible ~6s of 120s.
         ═══════════════════════════════════════════════ -->

    <!-- launch pad (static, always visible) -->
    <g transform="translate(1500, 900)">
        <rect x="-60" y="-8" width="120" height="16" rx="3" fill="#455A64" stroke="#263238" stroke-width="2"/>
        <rect x="-54" y="8"  width="14" height="26" fill="#263238"/>
        <rect x="40"  y="8"  width="14" height="26" fill="#263238"/>
        <line x1="-60" y1="-20" x2="-60" y2="-85" stroke="#263238" stroke-width="3"/>
        <line x1="60"  y1="-20" x2="60"  y2="-85" stroke="#263238" stroke-width="3"/>
        <line x1="-60" y1="-85" x2="60"  y2="-85" stroke="#263238" stroke-width="3"/>
    </g>

    <!-- T-MINUS countdown display beside the launch pad -->
    <g transform="translate(1350, 870)">
        <!-- digital display frame -->
        <rect x="-72" y="-50" width="144" height="100" rx="12" fill="#1B1B1B" stroke="#37474F" stroke-width="3"/>
        <rect x="-66" y="-44" width="132" height="86" rx="8" fill="#0D0D0D"/>
        <!-- bolts in corners -->
        <circle cx="-64" cy="-42" r="2.5" fill="#546E7A"/>
        <circle cx="64"  cy="-42" r="2.5" fill="#546E7A"/>
        <circle cx="-64" cy="42"  r="2.5" fill="#546E7A"/>
        <circle cx="64"  cy="42"  r="2.5" fill="#546E7A"/>
        <!-- T-MINUS label -->
        <text x="0" y="-22" text-anchor="middle" font-size="12" fill="#FF7043" font-weight="bold" font-family="Arial" letter-spacing="2">T-MINUS</text>

        <!-- Countdown: 121 slots (120..0), each ~0.9917s of the 120s cycle.
             Rocket launches at keyTime 0.991736 when "0" appears. -->
        <g font-weight="bold" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">120<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.000000;0.000000;0.008264;0.008264;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">119<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.008264;0.008264;0.016529;0.016529;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">118<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.016529;0.016529;0.024793;0.024793;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">117<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.024793;0.024793;0.033058;0.033058;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">116<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.033058;0.033058;0.041322;0.041322;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">115<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.041322;0.041322;0.049587;0.049587;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">114<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.049587;0.049587;0.057851;0.057851;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">113<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.057851;0.057851;0.066116;0.066116;1" dur="120s" repeatCount="indefinite"/></text>
            <text x="0" y="22" font-size="32" fill="#FFB300" opacity="0">112<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.066116;0.066116;0.074380;0.074380;1" dur="120s" repeatCount="indefinite"/></text>
